name: Test
on:
    push:
        branches:
            - master
            - ci/test # For testing changes to this workflow
    pull_request:
        branches:
            - master
    merge_group:
    workflow_dispatch:
    workflow_call:
permissions:
    contents: read
    actions: read
    checks: write
jobs:
    Tests:
        runs-on: ubuntu-latest
        name: Tests
        steps:
            - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
            - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6
              with:
                  run_install: true
            - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
              with:
                  node-version: '24'
                  cache: 'pnpm'
            - name: Compile
              run: pnpm compile
            - name: Run tests
              run: pnpm test
